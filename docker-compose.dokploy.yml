services:
  openclaw:
    # Build from the current repository by default (your code).
    build:
      context: .
      dockerfile: Dockerfile
    # Optional override if you intentionally want a prebuilt remote image.
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    # Managed named volumes are often root-owned on first attach.
    # Run as root in Dokploy/Coollabs so /data remains writable.
    user: "0:0"
    restart: unless-stopped
    command:
      [
        "sh",
        "-lc",
        "node openclaw.mjs config set gateway.controlUi.dangerouslyAllowHostHeaderOriginFallback true || true; exec node openclaw.mjs gateway --allow-unconfigured --bind lan --port 18789",
      ]
    environment:
      AUTH_USERNAME: ${AUTH_USERNAME:-}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-}

      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_GATEWAY_PORT: ${OPENCLAW_GATEWAY_PORT:-18789}
      OPENCLAW_GATEWAY_CONTROLUI_ALLOWED_ORIGINS: ${OPENCLAW_GATEWAY_CONTROLUI_ALLOWED_ORIGINS:-}
      OPENCLAW_GATEWAY_CONTROLUI_DANGEROUSLY_ALLOW_HOST_HEADER_ORIGIN_FALLBACK: ${OPENCLAW_GATEWAY_CONTROLUI_DANGEROUSLY_ALLOW_HOST_HEADER_ORIGIN_FALLBACK:-true}

      # State/workspace stay inside /data volume for managed Docker platforms.
      OPENCLAW_STATE_DIR: /data/.openclaw
      OPENCLAW_WORKSPACE_DIR: /data/workspace

      # Dedicated proxy for model APIs + OAuth only (not global traffic).
      OPENCLAW_MODELS_OAUTH_PROXY: ${OPENCLAW_MODELS_OAUTH_PROXY:-}

      # Browser sidecar connection.
      BROWSER_CDP_URL: ${BROWSER_CDP_URL:-http://browser:9222}
      BROWSER_DEFAULT_PROFILE: ${BROWSER_DEFAULT_PROFILE:-openclaw}

      # Typical model keys (keep only what you use).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}

      # Optional channels.
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN:-}

      # Gateway + Control UI listen on 18789 in this Dokploy profile.
      PORT: 18789
    volumes:
      - openclaw-data:/data
    depends_on:
      browser:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:${PORT:-18789}/healthz || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  browser:
    # GHCR browser image may require auth in some environments.
    # Use the public Coollabs browser image by default for managed deploys.
    image: ${OPENCLAW_BROWSER_IMAGE:-coollabsio/openclaw-browser:latest}
    restart: unless-stopped
    shm_size: 2g
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Etc/UTC}
      CHROME_CLI: ${CHROME_CLI:---remote-debugging-address=0.0.0.0 --remote-debugging-port=9222}
    volumes:
      - browser-data:/config
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/9222' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  dokploy-mcp:
    image: node:20-alpine
    command: ["npx","-y","@ahdev/dokploy-mcp"]
    environment:
      MCP_TRANSPORT: http
      DOKPLOY_URL: ${DOKPLOY_URL:-}
      DOKPLOY_API_KEY: ${DOKPLOY_API_KEY:-}

  github-mcp:
    image: ghcr.io/github/github-mcp-server:latest
    environment:
      GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_PERSONAL_ACCESS_TOKEN}

volumes:
  openclaw-data:
  browser-data:

networks:
  dokploy-network:
    external: true
